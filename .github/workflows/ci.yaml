name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

env:
  # Project requires Node 24+ (see CLAUDE.md / package.json "engines").
  NODE_VERSION: 24

jobs:
  build-and-lint:
    runs-on: ubuntu-22.04
    name: Build and Lint
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Build packages
        run: pnpm build:packages

      - name: Build
        run: pnpm build

      - name: Type-check
        run: pnpm -s check-types

      - name: Build tests
        run: pnpm build:tests

      - name: Lint
        run: pnpm lint

  unit-tests:
    runs-on: ubuntu-22.04
    name: Unit Tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Build packages
        run: pnpm build:packages

      - name: Build
        run: pnpm build

      - name: Build tests
        run: pnpm build:tests

      - name: Run unit tests
        run: pnpm test:unit

  # NOTE: no integration-tests job yet — `pnpm test:integration` is a no-op
  # placeholder (no *.int.ts exist; see CLAUDE.md). When integration tests land
  # (M2+), add the job here and to `ci-pass.needs` below.

  ci-pass:
    name: CI Pass
    if: always()
    needs:
      - build-and-lint
      - unit-tests
    runs-on: ubuntu-22.04
    steps:
      - name: Verify all required jobs succeeded
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
