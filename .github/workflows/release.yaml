name: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - 'main'
      - 'develop'
  workflow_dispatch:

env:
  # geniro-app ships as ONE product (the Electron app bundles the daemon; the
  # @packages/* are private), so it carries a single app-level version tagged
  # `v${version}` — semantic-release's default format, and what electron-builder
  # / electron-updater expect for the M4 auto-update feed.
  NODE_VERSION: 24

# GITHUB_TOKEN needs write access to push the version tag and cut the release.
permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-22.04
    name: Version
    outputs:
      released: ${{ steps.semantic.outputs.released }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Prepare repository
        run: |
          git config user.email "ci@geniro.app"
          git config user.name "Geniro Bot"

      - name: Up version
        id: semantic
        run: |
          OUTPUT=$(pnpm run up-versions)
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "no new version is released"; then
            echo "released=false" >> "$GITHUB_OUTPUT"
          else
            echo "released=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    runs-on: ubuntu-22.04
    name: Create Release
    needs: [version]
    if: ${{ needs.version.outputs.released == 'true' && github.ref_name == 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version tag
        id: tags
        run: |
          git fetch --tags --force --prune

          CURRENT_TAG="$(git tag --merged HEAD --list 'v[0-9]*' | sort -V | tail -n 1)"
          VERSION="${CURRENT_TAG#v}"

          if [[ -z "$VERSION" ]]; then
            echo "No v* tag found, skipping release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "current_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        if: steps.tags.outputs.skip != 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.tags.outputs.current_tag }} --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        if: steps.tags.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tags.outputs.current_tag }}
          name: "geniro v${{ steps.tags.outputs.version }}"
          body_path: CHANGES.md
          generate_release_notes: false

  # Build the ad-hoc macOS app (no Apple Developer ID) and attach the .dmg + .zip
  # to the release, so it can be installed via Homebrew or the install script.
  # This is NOT signed/notarized: the .zip/.dmg are meant to be fetched by
  # `brew`/`curl` (which don't set the quarantine bit), not opened straight from
  # a browser download. In-app silent auto-update stays disabled (it needs a real
  # Developer ID) — the app only reports newer releases and points at brew/curl.
  build-app:
    runs-on: macos-14 # arm64 runner — the only published arch
    name: Build & attach macOS app
    needs: [version, create-release]
    if: ${{ needs.version.outputs.released == 'true' && github.ref_name == 'main' }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.tag.outputs.version }}
      sha256: ${{ steps.sha.outputs.sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: |
          git fetch --tags --force --prune
          CURRENT_TAG="$(git tag --merged HEAD --list 'v[0-9]*' | sort -V | tail -n 1)"
          echo "current_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          echo "version=${CURRENT_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Sync the packaged app version to the tag
        run: node scripts/sync-app-version.mjs "${{ steps.tag.outputs.version }}"

      - name: Build macOS app (ad-hoc)
        # No CSC_NAME/CSC_LINK in env → build-mac.mjs produces an ad-hoc build
        # with no auto-update feed (fails closed), exactly as intended here.
        run: pnpm --filter @geniro/ui build:mac

      - name: Attach artifacts to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.tag.outputs.version }}
        run: |
          gh release upload "v${V}" \
            "release/dist/Geniro-${V}-arm64.dmg" \
            "release/dist/Geniro-${V}-arm64-mac.zip" \
            --clobber

      - name: Compute the zip sha256 (for the Homebrew cask)
        id: sha
        env:
          V: ${{ steps.tag.outputs.version }}
        run: |
          SHA="$(shasum -a 256 "release/dist/Geniro-${V}-arm64-mac.zip" | awk '{print $1}')"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

  # Update the Homebrew cask in the tap repo. Opt-in: gated on the repo variable
  # HOMEBREW_TAP_REPO (e.g. "geniro-io/homebrew-tap"); until it and the
  # HOMEBREW_TAP_TOKEN secret (a PAT with write to that repo — GITHUB_TOKEN can't
  # push cross-repo) are set, this job is skipped and the release still ships the
  # .dmg/.zip for the install script.
  bump-cask:
    runs-on: ubuntu-22.04
    name: Bump Homebrew cask
    needs: [build-app]
    if: ${{ needs.build-app.result == 'success' && vars.HOMEBREW_TAP_REPO != '' }}
    steps:
      - name: Checkout tap
        uses: actions/checkout@v5
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render cask
        env:
          V: ${{ needs.build-app.outputs.version }}
          SHA: ${{ needs.build-app.outputs.sha256 }}
        run: |
          mkdir -p tap/Casks
          cat > tap/Casks/geniro.rb <<EOF
          cask "geniro" do
            version "${V}"
            sha256 "${SHA}"

            url "https://github.com/geniro-io/geniro-app/releases/download/v#{version}/Geniro-#{version}-arm64-mac.zip"
            name "Geniro"
            desc "Local-first desktop app for composing and running a DAG of CLI coding agents"
            homepage "https://github.com/geniro-io/geniro-app"

            depends_on arch: :arm64
            depends_on macos: ">= :sonoma"

            app "Geniro.app"

            # Ad-hoc build: strip com.apple.quarantine so the app can spawn its
            # bundled daemon instead of being Gatekeeper-blocked (Homebrew 6.x
            # always quarantines and dropped --no-quarantine).
            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-dr", "com.apple.quarantine", "#{appdir}/Geniro.app"]
            end

            zap trash: [
              "~/Library/Application Support/Geniro",
              "~/Library/Application Support/geniro",
              "~/Library/Preferences/io.geniro.desktop.plist",
              "~/Library/Logs/Geniro",
              "~/Library/Saved Application State/io.geniro.desktop.savedState",
            ]
          end
          EOF

      - name: Commit and push
        working-directory: tap
        env:
          V: ${{ needs.build-app.outputs.version }}
        run: |
          git config user.email "ci@geniro.app"
          git config user.name "Geniro Bot"
          git add Casks/geniro.rb
          if git diff --cached --quiet; then
            echo "cask already up to date"
          else
            git commit -m "geniro ${V}"
            git push
          fi
