packages:
  - apps/*
  - packages/*

# Dependencies whose install/build scripts pnpm is allowed to run. pnpm blocks
# build scripts by default; only the native / binary-downloading deps below opt
# in. Anything not listed (e.g. @scarf/scarf telemetry) never runs its scripts.
onlyBuiltDependencies:
  - '@swc/core' # postinstall links the platform-native swc binary
  - better-sqlite3 # native C++ addon (node-gyp / prebuild-install)
  - electron # postinstall downloads the Electron binary
  - esbuild # postinstall installs the platform binary (used by vite)

# Force a single fastify so NestJS (platform-fastify) and our direct dep share
# one copy — otherwise the @fastify/websocket type augmentation doesn't unify.
overrides:
  fastify: 5.9.0
